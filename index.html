<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #fafafa; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #262626; padding: 20px; }
        
        /* --- GİRİŞ PANELİ (LOGIN) --- */
        .login-wrapper { display: flex; flex-direction: column; width: 350px; }
        .login-container { background: white; border: 1px solid #dbdbdb; padding: 30px 40px; text-align: center; border-radius: 1px; width: 100%; }
        
        /* CSS ile Kırılmayan Yazı Logosu */
        .insta-text-logo { font-family: 'Georgia', 'Times New Roman', serif; font-size: 38px; font-weight: 500; margin: 22px 0 35px 0; font-style: italic; color: #262626; }
        
        /* Form Elemanları Garanti Altında */
        .login-form { display: flex; flex-direction: column; width: 100%; }
        .input-wrapper { position: relative; margin-bottom: 6px; width: 100%; }
        .input-box { width: 100%; padding: 10px 8px; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; font-size: 12px; outline: none; color: #262626; }
        .input-box:focus { border-color: #a8a8a8; }
        
        .login-btn { width: 100%; background-color: #0095f6; border: none; color: white; padding: 7px 0; border-radius: 4px; font-weight: bold; font-size: 14px; cursor: pointer; margin: 8px 0 20px 0; }
        .error-message { color: #ed4956; font-size: 14px; margin-top: 10px; font-weight: 500; text-align: center; display: none; }

        /* --- PROFİL PANELİ (DASHBOARD) --- */
        .profile-container { display: none; width: 100%; max-width: 935px; margin: 0 auto; padding: 30px 20px; pointer-events: none; user-select: none; }
        .profile-header { display: flex; align-items: center; margin-bottom: 44px; border-bottom: 1px solid #dbdbdb; padding-bottom: 44px; }
        .pfp-wrapper { width: 150px; height: 150px; border-radius: 50%; overflow: hidden; margin-right: 100px; border: 1px solid #dbdbdb; flex-shrink: 0; }
        .pfp-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info h1 { font-size: 28px; font-weight: 300; margin-bottom: 20px; display: inline-block; }
        .verified-badge { color: #0095f6; font-size: 20px; margin-left: 8px; vertical-align: middle; }
        .stats { display: flex; gap: 40px; margin-bottom: 20px; font-size: 16px; }
        .stats span { font-weight: bold; }
        .stats li { list-style: none; }
        .bio { font-size: 16px; font-weight: 600; line-height: 1.5; }
        .bio span { font-weight: 400; color: #8e8e8e; display: block; margin-top: 5px; }

        .posts-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; width: 100%; }
        .post-card { position: relative; aspect-ratio: 1 / 1; background-color: #efefef; overflow: hidden; border: 1px solid #dbdbdb; }
        .post-card img { width: 100%; height: 100%; object-fit: cover; }
        .post-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; font-size: 18px; opacity: 0; }
        .post-card:hover .post-overlay { opacity: 1; }

        @media (max-width: 735px) {
            .pfp-wrapper { margin-right: 30px; width: 80px; height: 80px; }
            .profile-header { margin-bottom: 20px; padding-bottom: 20px; }
            .profile-info h1 { font-size: 22px; }
            .stats { gap: 15px; font-size: 13px; }
            .posts-grid { gap: 3px; }
        }
    </style>
</head>
<body>

    <div id="loginWrapper" class="login-wrapper">
        <div class="login-container">
            <div class="insta-text-logo">Instagram</div>
            
            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="input-wrapper">
                    <input type="text" id="username" class="input-box" placeholder="Telefon numarası, kullanıcı adı veya e-posta" required autocomplete="off">
                </div>
                <div class="input-wrapper">
                    <input type="password" id="password" class="input-box" placeholder="Şifre" required>
                </div>
                <button type="submit" class="login-btn">Giriş Yap</button>
            </form>
            
            <div id="errorMsg" class="error-message">Girdiğin kullanıcı adı veya şifre hatalı. Lütfen tekrar dene.</div>
        </div>
    </div>

    <div id="profileBox" class="profile-container">
        <div class="profile-header">
            <div class="pfp-wrapper">
                <img src="berat.jpg" alt="Profil Resmi">
            </div>
            <div class="profile-info">
                <h1>beratozer <span class="verified-badge">✓</span></h1>
                <ul class="stats">
                    <li><span>3</span> gönderi</li>
                    <li><span>4.218</span> takipçi</li>
                    <li><span>312</span> takip</li>
                </ul>
                <div class="bio">
                    Berat Özer
                    <p style="font-weight: 400; margin-top: 4px;">Software Engineer | System Analyst 🛠️</p>
                    <span>📍 Istanbul, Alibeyköy</span>
                </div>
            </div>
        </div>

        <div class="posts-grid">
            <div class="post-card">
                <img src="https://images.unsplash.com/photo-1527838832700-50592524df75?q=80&w=600&auto=format&fit=cover" alt="Istanbul">
                <div class="post-overlay">❤️ 1.412  💬 84</div>
            </div>
            <div class="post-card">
                <img src="https://images.unsplash.com/photo-1549877452-9c387954fbc2?q=80&w=600&auto=format&fit=cover" alt="Galata">
                <div class="post-overlay">❤️ 2.105  💬 112</div>
            </div>
            <div class="post-card">
                <img src="https://images.unsplash.com/photo-1599946347371-68eb71b16afc?q=80&w=600&auto=format&fit=cover" alt="Sunset">
                <div class="post-overlay">❤️ 1.890  💬 95</div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            var userInp = document.getElementById('username').value.trim();
            var passInp = document.getElementById('password').value;
            var errorDiv = document.getElementById('errorMsg');
            
            if (userInp === 'beratozer' && passInp === 'babanız') {
                document.getElementById('loginWrapper').style.display = 'none';
                document.body.style.backgroundColor = '#ffffff';
                document.body.style.alignItems = 'flex-start';
                
                var profile = document.getElementById('profileBox');
                profile.style.display = 'block';
                
                document.title = "Berat Özer (@beratozer) • Instagram fotoğrafları ve videoları";
            } else {
                errorDiv.style.display = 'block';
                document.getElementById('password').value = '';
            }
        }
    </script>

</body>
</html>
